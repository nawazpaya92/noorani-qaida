<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Qaida OCR Converter</title>

<style>
body{
font-family: Arial;
padding:40px;
background:#f5f5f5;
}

textarea{
width:100%;
height:150px;
margin-bottom:20px;
font-size:18px;
direction:rtl;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

pre{
background:white;
padding:20px;
margin-top:20px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>Paste Arabic OCR Text</h2>

<textarea id="input"></textarea>

<button onclick="convert()">Convert</button>

<pre id="output"></pre>

<script>

function convert(){

const text = document.getElementById("input").value;

const words = text
.replace(/\n/g," ")
.split(" ")
.filter(w=>w.trim() !== "");

let result = words.map((w,i)=>{

return `{ id: "word${i+1}", text: "${w}" }`

}).join(",\n");

document.getElementById("output").textContent = result;

}

</script>

</body>
</html>
